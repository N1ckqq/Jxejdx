name: Build APK & Release

on:
  push:
    branches: [ main, feature/dependency-checkboxes-auto-download ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;25.2.9519653"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find ZalithLauncher/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-debug
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.4.3-fork.4-build.${{ github.run_number }}
          name: "Jxejdx Launcher v2.4.3-fork.4 (Build #${{ github.run_number }})"
          body: |
            ## Jxejdx Launcher v2.4.3-fork.4

            Автоматическая сборка из ветки `${{ github.ref_name }}`

            ---

            ### ✨ Новые функции

            **Скачивание модов:**
            - Галочки рядом с зависимостями — выбирайте какие зависимости скачать
            - Авто-определение версии Minecraft и мод-лоадера
            - Автоматический поиск совместимой версии зависимости через Modrinth/CurseForge API
            - Скачивание зависимостей вместе с основным модом в один клик
            - Обязательные зависимости отмечены по умолчанию, опциональные — нет

            **Интеллектуальные системы:**
            - 🧠 Умная рекомендация RAM — анализирует количество модов + MC-версию + RAM устройства
            - 🔍 Авто-парсер крэш-логов — определяет виноватый мод, категоризует ошибку, предлагает решение
            - ⏱️ Трекер игрового времени — статистика по версиям (сегодня/неделя/всё время)
            - 🔔 Уведомления об обновлениях модов — фоновая проверка через API каждые 12 часов
            - 🏎️ Бенчмарк рендереров — EGL-тест GPU + оценка каждого рендерера + рекомендация

            **UI/UX:**
            - 📋 Интерактивный changelog с историей изменений

            ---

            ### 🔧 Ранее добавлено (fork.3)
            - Пакетное скачивание модов (мультивыбор галочками)
            - Полноценный оффлайн-вход без Microsoft
            - Полное меню входа (Microsoft + оффлайн + внешние серверы авторизации)

            ---

            ### 🐛 Исправления
            - Исправлена ошибка компиляции `DIR_DATA` → `DIR_CACHE`
            - Исправлена ошибка `computeSHA1` → `calculateFileSha1`
            - Обновлены строковые ресурсы (EN, RU, ZH-CN) для новых функций

            ---

            ### 📱 Установка
            1. Скачайте APK файл ниже
            2. Установите на Android устройство (Android 8.0+)
            3. Разрешите установку из неизвестных источников если потребуется

            ### ⚠️ Важно
            - Это debug-сборка, не для продакшена
            - Поддерживаемые архитектуры: arm64-v8a, armeabi-v7a, x86, x86_64
            - Минимальная версия: Android 8.0 (API 26)
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
